{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
    <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 sm:text-5xl md:text-6xl mb-6">
        Optimize Your <span class="text-strava">Training Load</span>
    </h1>
    <p class="mt-3 max-w-md mx-auto text-base text-gray-500 sm:text-lg md:mt-5 md:text-xl md:max-w-3xl mb-10">
        Connect your Strava account to automatically track your Training Stress Score (TSS), Acute Training Load (ATL), Chronic Training Load (CTL), and Training Stress Balance (TSB).
    </p>
    
    <div class="flex justify-center">
        <a href="/auth/login" class="inline-flex items-center px-8 py-4 border border-transparent text-lg font-medium rounded-md shadow-sm text-white bg-strava hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-strava transition-colors">
            Connect with Strava
        </a>
    </div>
</div>
{% endblock %}
